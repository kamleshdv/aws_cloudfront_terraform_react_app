name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install   # No 'cd react-app'
      
      - name: Build
        run: npm run build   # No 'cd react-app'
      
      - name: List files (debug)
        run: ls -la   # Ye check karega ki build folder bana ya nahi
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'   # Direct 'dist', not './react-app/dist'
      
      - name: Deploy
        uses: actions/deploy-pages@v4
